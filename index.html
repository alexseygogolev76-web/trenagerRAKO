<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр · Бренды и характеристики</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #EEF3FF;
            color: #333F48;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        .pattern-upper, .pattern-lower {
            position: fixed;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            font-size: 3rem;
            color: #21A19A;
            transform: rotate(-5deg);
            gap: 2rem;
            padding: 1rem;
        }
        .pattern-upper { top: 0; height: 160px; }
        .pattern-lower { bottom: 0; height: 160px; }
        .trainer-container {
            width: 1400px;
            max-width: 98%;
            max-height: 98vh;
            background-color: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 2.5rem 2.5rem 3rem;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(33,161,154,0.2);
            display: flex;
            flex-direction: column;
        }
        .variants-area {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 8px;
            margin: 2rem 0 1.5rem;
        }
        .drag-container {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            margin: 2rem 0 1.5rem;
            overflow-y: visible;
        }
        .target-area {
            flex: 1;
            max-height: 450px;
            overflow-y: auto;
            background: rgba(16,127,140,0.08);
            border-radius: 32px;
            padding: 1.5rem;
            border: 2px solid #21A19A;
            display: flex;
            flex-direction: column;
        }
        .source-variants {
            flex: 1;
            max-height: 450px;
            overflow-y: auto;
            background: rgba(33,161,154,0.05);
            border-radius: 32px;
            padding: 1.5rem 1rem;
            border: 2px dashed #21A19A;
            min-height: 200px;
            transition: background 0.2s;
        }
        .characteristic-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 5px;
            background: white;
            border-radius: 40px;
            border: 1px solid #21A19A;
        }
        .char-name {
            flex: 0 0 150px;
            font-weight: 600;
            color: #107F8C;
            padding-left: 20px;
        }
        .drop-slot {
            flex: 1;
            min-height: 50px;
            background: #e6f4f2;
            border-radius: 40px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        .draggable-item {
            background: white;
            border: 2px solid #21A19A;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            margin: 0.5rem;
            display: inline-block;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 6px 10px rgba(0,0,0,0.03);
            cursor: grab;
            user-select: none;
            transition: 0.1s;
        }
        .draggable-item:active {
            cursor: grabbing;
            opacity: 0.8;
        }
        .drop-slot .draggable-item {
            margin: 0;
            width: 100%;
            background: #d4ece8;
            border-color: #107F8C;
        }
        .button-mode {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .option-btn {
            background: white;
            border: 2px solid #21A19A;
            color: #333F48;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(33,161,154,0.1);
            min-width: 200px;
            text-align: center;
        }
        .option-btn.selected {
            background: #21A19A;
            color: white;
            border-color: #107F8C;
        }
        .emergency-exit {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: rgba(33,161,154,0.15);
            border: none;
            color: #333F48;
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 100;
        }
        .emergency-exit:hover {
            background: rgba(33,161,154,0.35);
            transform: scale(1.05);
        }
        .chat-area {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
        }
        .bot-message {
            background-color: #107F8C;
            color: white;
            padding: 1.2rem 2rem;
            border-radius: 30px 30px 30px 8px;
            max-width: 80%;
            font-weight: 500;
            font-size: 1.2rem;
            box-shadow: 0 8px 14px rgba(16,127,140,0.2);
            align-self: flex-start;
            margin-bottom: 0.8rem;
        }
        .brand-header {
            font-weight: 600;
            font-size: 1.6rem;
            color: #107F8C;
            margin: 1rem 0 0.5rem;
            border-bottom: 3px solid #21A19A;
            display: inline-block;
            padding-right: 2rem;
        }
        .instruction {
            font-size: 1.2rem;
            margin: 0.5rem 0 1rem;
            color: #333F48;
        }
        .char-list {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: #107F8C;
            font-weight: 500;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .char-list span {
            background: #f0fafc;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid #21A19A;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }
        .left-note {
            color: #107F8C;
            font-size: 1rem;
            background: rgba(33,161,154,0.1);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            max-width: 450px; /* увеличено для правильного переноса */
            line-height: 1.4;
        }
        .right-buttons {
            display: flex;
            gap: 1.2rem;
        }
        .primary-btn {
            background: #21A19A;
            border: none;
            color: white;
            padding: 0.8rem 2.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(33,161,154,0.3);
            transition: 0.15s;
            border: 1px solid transparent;
        }
        .primary-btn:hover {
            background: #107F8C;
            transform: scale(1.02);
        }
        .hint-btn {
            background: rgba(33,161,154,0.15);
            color: #107F8C;
            border: 1px solid #107F8C;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            display: none;
        }
        .hint-btn.visible {
            display: inline-block;
        }
        .hint-btn:hover {
            background: #21A19A;
            color: white;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hint-modal, .welcome-modal {
            background: white;
            border-radius: 48px;
            padding: 2.5rem 3rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 40px 70px rgba(0,0,0,0.3);
            text-align: center;
        }
        .welcome-modal p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            text-align: left;
            color: #333F48;
        }
        .welcome-modal .primary-btn {
            margin-top: 1rem;
            padding: 0.8rem 3rem;
            font-size: 1.2rem;
        }
        .hint-modal h2 {
            color: #107F8C;
            font-weight: 400;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            line-height: 1.4;
        }
        .hint-modal h2 strong {
            font-weight: 700;
        }
        .correct-answer-box {
            background: #f0fafc;
            border-radius: 32px;
            padding: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 1.5rem 0;
            border: 2px solid #21A19A;
        }
        .correct-chip {
            background: #107F8C;
            color: white;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-weight: 500;
        }
        .close-modal {
            background: #21A19A;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .final-screen {
            text-align: center;
            padding: 3rem 1rem;
        }
        .final-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .success-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #21A19A;
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.4rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border: 2px solid white;
        }
        .success-toast.show {
            opacity: 1;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="pattern-upper">
        <i class="fas fa-truck"></i><i class="fas fa-bus"></i><i class="fas fa-truck-moving"></i><i class="fas fa-truck"></i>
        <i class="fas fa-bus"></i><i class="fas fa-truck-pickup"></i><i class="fas fa-truck"></i><i class="fas fa-bus"></i>
        <i class="fas fa-truck"></i><i class="fas fa-bus"></i><i class="fas fa-truck-moving"></i><i class="fas fa-truck"></i>
        <i class="fas fa-bus"></i><i class="fas fa-truck-pickup"></i><i class="fas fa-truck"></i><i class="fas fa-bus"></i>
    </div>
    <div class="pattern-lower">
        <i class="fas fa-truck"></i><i class="fas fa-bus"></i><i class="fas fa-truck-moving"></i><i class="fas fa-truck"></i>
        <i class="fas fa-bus"></i><i class="fas fa-truck-pickup"></i><i class="fas fa-truck"></i><i class="fas fa-bus"></i>
        <i class="fas fa-truck"></i><i class="fas fa-bus"></i><i class="fas fa-truck-moving"></i><i class="fas fa-truck"></i>
        <i class="fas fa-bus"></i><i class="fas fa-truck-pickup"></i><i class="fas fa-truck"></i><i class="fas fa-bus"></i>
    </div>

    <div id="successToast" class="success-toast">✅ Отлично!</div>

    <div class="trainer-container" id="trainerContainer">
        <button class="emergency-exit" id="emergencyExit" title="Экстренный выход (прогресс сохранится)"><i class="fas fa-times"></i></button>
        <div id="trainerContent"></div>
    </div>

    <script>
        (function() {
            const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-HOsc6ExeeEKLVSY1NjY9Iwpc-lnErrJuQBs6sbBZYwrnYjI2iqTSnzn0hUS7uRadhaITcHONOt7Y/pub?output=csv';
            
            let headers = [];
            let allBrands = [];
            let columnsData = [];

            let brandOrder = [];
            let currentOrderIndex = 0;
            let currentMode = 'buttons';
            let errorCount = 0;
            let hintTimer = null;
            let isCompleted = false;

            const trainerContent = document.getElementById('trainerContent');
            const emergencyBtn = document.getElementById('emergencyExit');
            const toast = document.getElementById('successToast');

            const successPhrases = [
                "Отлично!", "Верно!", "Так держать!", "Правильно!",
                "Молодец!", "Супер!", "Точно!", "Здорово!"
            ];

            const welcomeText = `Этот тренажер поможет тебе выучить все ключевые бренды рабочего ассортимента! 
<strong>Варианта ошибиться нет!</strong> 
Задумаешься - появится кнопка подсказка!
Сделаешь 2 ошибки подсказка откроется сама!
Удачи в тренировке!`;

            function showWelcomeModal(callback) {
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                overlay.innerHTML = `
                    <div class="welcome-modal">
                        <h2 style="color: #107F8C; font-weight: 600;">Добро пожаловать!</h2>
                        <p>${welcomeText.replace(/\n/g, '<br>')}</p>
                        <button class="primary-btn" id="startWelcomeBtn">Начать тренировку</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('startWelcomeBtn').addEventListener('click', () => {
                    overlay.remove();
                    callback();
                });
            }

            async function loadData() {
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    const csvText = await response.text();
                    parseSheetData(csvText);
                    checkResumeOrStart();
                } catch (e) {
                    trainerContent.innerHTML = `<div class="bot-message">Ошибка загрузки данных. Проверьте интернет или ссылку.</div>`;
                }
            }

            function parseSheetData(csv) {
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length < 2) return;

                const headerRow = lines[0].split(',').map(c => c.replace(/^"|"$/g, '').trim());
                headers = headerRow;

                const dataRows = lines.slice(1);
                const brands = [];
                const cols = [[], [], [], [], [], [], []];

                dataRows.forEach(row => {
                    const colsRow = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                    if (colsRow.length < 8) return;
                    const brand = colsRow[0];
                    if (!brand) return;
                    
                    const characteristics = colsRow.slice(1, 8);
                    brands.push({ brand, characteristics });

                    for (let i = 1; i <= 7; i++) {
                        if (colsRow[i] && colsRow[i].length > 0) {
                            cols[i-1].push(colsRow[i]);
                        }
                    }
                });

                allBrands = brands;
                columnsData = cols;
                console.log('Загружено брендов:', allBrands.length);
            }

            function saveProgress() {
                if (allBrands.length === 0) return;
                const state = { order: brandOrder, currentIdx: currentOrderIndex, completed: isCompleted };
                localStorage.setItem('trainerProgress', JSON.stringify(state));
            }

            function loadProgress() {
                const saved = localStorage.getItem('trainerProgress');
                if (saved) {
                    try {
                        const state = JSON.parse(saved);
                        if (state && Array.isArray(state.order) && typeof state.currentIdx === 'number' && !state.completed) {
                            return { order: state.order, currentIdx: state.currentIdx };
                        }
                    } catch (e) {}
                }
                return null;
            }

            function clearProgress() { localStorage.removeItem('trainerProgress'); }

            function createShuffledOrder(length) {
                const arr = Array.from({ length }, (_, i) => i);
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function checkResumeOrStart() {
                const saved = loadProgress();
                if (saved && saved.order.length === allBrands.length && saved.currentIdx < allBrands.length) {
                    trainerContent.innerHTML = `
                        <div class="bot-message">👋 Привет! У вас есть незавершённая тренировка.</div>
                        <div style="display: flex; gap:1rem; margin:2rem 0;">
                            <button class="primary-btn" id="resumeBtn">Продолжить</button>
                            <button class="primary-btn" style="background:#fff; color:#21A19A;" id="restartBtn">Начать заново</button>
                        </div>
                    `;
                    document.getElementById('resumeBtn').addEventListener('click', () => {
                        brandOrder = saved.order;
                        currentOrderIndex = saved.currentIdx;
                        startTraining();
                    });
                    document.getElementById('restartBtn').addEventListener('click', () => {
                        clearProgress();
                        brandOrder = createShuffledOrder(allBrands.length);
                        currentOrderIndex = 0;
                        showWelcomeModal(() => startTraining());
                    });
                } else {
                    clearProgress();
                    brandOrder = createShuffledOrder(allBrands.length);
                    currentOrderIndex = 0;
                    showWelcomeModal(() => startTraining());
                }
            }

            function startTraining() {
                if (allBrands.length === 0) {
                    trainerContent.innerHTML = `<div class="bot-message">Нет данных для тренировки.</div>`;
                    return;
                }
                isCompleted = false;
                showCurrentTask();
            }

            function getCurrentBrand() {
                if (brandOrder.length === 0 || currentOrderIndex >= brandOrder.length) return null;
                return allBrands[brandOrder[currentOrderIndex]];
            }

            function getRandomFromColumn(colIdx, count, excludeValue = null) {
                let values = columnsData[colIdx];
                if (excludeValue !== null) {
                    values = values.filter(v => v !== excludeValue);
                }
                let unique = [...new Set(values)];
                if (unique.length <= count) {
                    return unique;
                }
                return shuffleArray(unique).slice(0, count);
            }

            function generateOptions(correctValues) {
                let allOptions = [];

                for (let colIdx = 0; colIdx < 7; colIdx++) {
                    const correctVal = correctValues[colIdx] && correctValues[colIdx].trim() !== '' ? correctValues[colIdx] : null;

                    if (colIdx === 3) { // столбец E
                        if (correctVal) {
                            allOptions.push(correctVal);
                            if ("Оф. дилер" !== correctVal) {
                                allOptions.push("Оф. дилер");
                            }
                        } else {
                            allOptions.push("Оф. дилер");
                        }
                    } else {
                        if (correctVal) {
                            allOptions.push(correctVal);
                            let wrongs = getRandomFromColumn(colIdx, 2, correctVal);
                            allOptions.push(...wrongs);
                        } else {
                            let wrongs = getRandomFromColumn(colIdx, 3);
                            allOptions.push(...wrongs);
                        }
                    }
                }

                allOptions = [...new Set(allOptions)];
                return shuffleArray(allOptions);
            }

            function initDragDropMode(correctValues, brandName, allOptions) {
                const source = document.getElementById('sourceContainer');
                const target = document.getElementById('targetContainer');

                target.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    const row = document.createElement('div');
                    row.className = 'characteristic-row';
                    row.innerHTML = `
                        <span class="char-name">${headers[i+1]}:</span>
                        <div class="drop-slot" data-col="${i}"></div>
                    `;
                    target.appendChild(row);
                }

                source.innerHTML = '';
                allOptions.forEach(opt => {
                    const el = document.createElement('div');
                    el.className = 'draggable-item';
                    el.setAttribute('draggable', 'true');
                    el.dataset.opt = opt;
                    el.textContent = opt;
                    source.appendChild(el);
                });

                const draggables = document.querySelectorAll('.draggable-item');
                draggables.forEach(item => {
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragend', handleDragEnd);
                });

                const dropSlots = document.querySelectorAll('.drop-slot');
                dropSlots.forEach(slot => {
                    slot.addEventListener('dragover', (e) => e.preventDefault());
                    slot.addEventListener('drop', handleDropOnSlot);
                });

                source.addEventListener('dragover', (e) => e.preventDefault());
                source.addEventListener('drop', handleDropOnSource);

                function handleDragStart(e) {
                    e.dataTransfer.setData('text/plain', e.target.dataset.opt);
                    e.target.classList.add('dragging');
                }
                function handleDragEnd(e) {
                    e.target.classList.remove('dragging');
                }

                function handleDropOnSlot(e) {
                    e.preventDefault();
                    const opt = e.dataTransfer.getData('text/plain');
                    if (!opt) return;
                    const draggedElement = document.querySelector(`[draggable="true"][data-opt="${opt}"]`);
                    if (!draggedElement) return;

                    const slot = e.currentTarget;
                    const col = slot.dataset.col;

                    if (slot.children.length > 0) {
                        const oldEl = slot.children[0];
                        source.appendChild(oldEl);
                    }
                    slot.appendChild(draggedElement);
                }

                function handleDropOnSource(e) {
                    e.preventDefault();
                    const opt = e.dataTransfer.getData('text/plain');
                    if (!opt) return;
                    const draggedElement = document.querySelector(`[draggable="true"][data-opt="${opt}"]`);
                    if (!draggedElement) return;
                    if (draggedElement.parentNode === source) return;
                    source.appendChild(draggedElement);
                }
            }

            function getDroppedValues() {
                const slots = document.querySelectorAll('.drop-slot');
                const values = [];
                slots.forEach(slot => {
                    if (slot.children.length > 0) {
                        values.push(slot.children[0].dataset.opt);
                    } else {
                        values.push(null);
                    }
                });
                return values;
            }

            function showCurrentTask() {
                if (currentOrderIndex >= allBrands.length) { showFinalScreen(); return; }

                const brandData = getCurrentBrand();
                if (!brandData) return;

                errorCount = 0;
                if (hintTimer) clearTimeout(hintTimer);

                currentMode = Math.random() < 0.5 ? 'buttons' : 'dragdrop';

                const correctValues = brandData.characteristics;
                const allOptions = generateOptions(correctValues);

                let instructionHtml = `
                    <div class="chat-area">
                        <div class="bot-message">${currentOrderIndex === 0 ? 'А ты точно все запомнил? Сейчас узнаем!' : 'Следующий бренд!'}</div>
                    </div>
                    <div class="instruction"><strong>Бренд ${brandData.brand}.</strong></div>
                    <div class="instruction">Выбери все характеристики:</div>
                `;

                if (currentMode === 'buttons') {
                    instructionHtml += `<div class="char-list">${headers.slice(1).map(h => `<span>${h}</span>`).join('')}</div>`;
                }

                let mainHtml = '';
                if (currentMode === 'buttons') {
                    mainHtml = `
                        <div class="variants-area" id="variantsContainer">
                            <div class="button-mode">
                                ${allOptions.map(opt => `<button class="option-btn" data-opt="${opt.replace(/"/g, '&quot;')}">${opt}</button>`).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    mainHtml = `
                        <div class="drag-container">
                            <div class="target-area" id="targetContainer"></div>
                            <div class="source-variants" id="sourceContainer"></div>
                        </div>
                    `;
                }

                const fullHtml = instructionHtml + mainHtml + `
                    <div class="action-buttons">
                        <div class="left-note">Если у этого бренда нет какой-то характеристики,<br>просто оставь варианты без использования!</div>
                        <div class="right-buttons">
                            <button class="hint-btn" id="hintButton">Подсказка</button>
                            <button class="primary-btn" id="checkBtn">Проверить</button>
                        </div>
                    </div>
                `;

                trainerContent.innerHTML = fullHtml;

                if (currentMode === 'buttons') {
                    initButtonsMode(correctValues.filter(v => v && v.trim() !== ''));
                } else {
                    initDragDropMode(correctValues, brandData.brand, allOptions);
                }

                // Таймер 60 секунд
                hintTimer = setTimeout(() => {
                    const hintBtn = document.getElementById('hintButton');
                    if (hintBtn) hintBtn.classList.add('visible');
                }, 60000);

                document.getElementById('hintButton')?.addEventListener('click', () => {
                    showHintModal(brandData.brand, correctValues.filter(v => v && v.trim() !== ''));
                });

                document.getElementById('checkBtn').addEventListener('click', () => {
                    if (currentMode === 'buttons') {
                        checkButtonsAnswer(correctValues.filter(v => v && v.trim() !== ''), brandData.brand);
                    } else {
                        checkDragDropAnswer(correctValues, brandData.brand);
                    }
                });
            }

            function initButtonsMode(correct) {
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => btn.classList.toggle('selected'));
                });
            }

            function checkButtonsAnswer(correctValues, brandName) {
                const selected = Array.from(document.querySelectorAll('.option-btn.selected')).map(btn => btn.dataset.opt);
                const isCorrect = arraysEqualIgnoringOrder(selected, correctValues);
                if (isCorrect) {
                    showSuccessToast();
                    currentOrderIndex++;
                    saveProgress();
                    showCurrentTask();
                } else {
                    handleWrongAnswer(brandName, correctValues);
                }
            }

            function checkDragDropAnswer(correctValues, brandName) {
                const dropped = getDroppedValues();
                let isCorrect = true;
                for (let i = 0; i < 7; i++) {
                    if (correctValues[i] && correctValues[i].trim() !== '') {
                        if (dropped[i] !== correctValues[i]) {
                            isCorrect = false;
                            break;
                        }
                    } else {
                        if (dropped[i] !== null) {
                            isCorrect = false;
                            break;
                        }
                    }
                }
                if (isCorrect) {
                    showSuccessToast();
                    currentOrderIndex++;
                    saveProgress();
                    showCurrentTask();
                } else {
                    handleWrongAnswer(brandName, correctValues.filter(v => v && v.trim() !== ''));
                }
            }

            function showSuccessToast() {
                if (!toast) return;
                const randomIndex = Math.floor(Math.random() * successPhrases.length);
                toast.textContent = '✅ ' + successPhrases[randomIndex];
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            }

            function handleWrongAnswer(brandName, correctValues) {
                errorCount++;
                if (errorCount >= 2) {
                    showHintModal(brandName, correctValues, true);
                } else {
                    const msg = document.createElement('div');
                    msg.className = 'bot-message';
                    msg.style.marginTop = '1rem';
                    msg.style.backgroundColor = '#f0b0b0';
                    msg.style.color = '#333';
                    msg.innerText = 'Неверно, попробуй ещё!';
                    document.querySelector('.chat-area').appendChild(msg);
                    setTimeout(() => msg.remove(), 2000);
                }
            }

            function showHintModal(brandName, correctValues, force = false) {
                if (document.querySelector('.overlay')) return;
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                overlay.innerHTML = `
                    <div class="hint-modal">
                        <h2><strong>Внимание!!!</strong><br>А вот и верный ответ!</h2>
                        <div style="font-size:1.3rem; margin-bottom:0.5rem;">${brandName}</div>
                        <div class="correct-answer-box">
                            ${correctValues.map(val => `<span class="correct-chip">${val}</span>`).join('')}
                        </div>
                        <button class="close-modal" id="closeHintModal">Понятно</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('closeHintModal').addEventListener('click', () => overlay.remove());
            }

            function showFinalScreen() {
                isCompleted = true;
                clearProgress();
                trainerContent.innerHTML = `
                    <div class="final-screen">
                        <div class="bot-message" style="max-width:100%;">🏁 Тренировка завершена</div>
                        <div class="final-buttons">
                            <button class="primary-btn" id="repeatBtn">Повторим?</button>
                            <button class="primary-btn" style="background:#fff; color:#21A19A;" id="enoughBtn">На сегодня хватит</button>
                        </div>
                    </div>
                `;
                document.getElementById('repeatBtn').addEventListener('click', () => {
                    brandOrder = createShuffledOrder(allBrands.length);
                    currentOrderIndex = 0;
                    clearProgress();
                    showWelcomeModal(() => startTraining());
                });
                document.getElementById('enoughBtn').addEventListener('click', () => {
                    trainerContent.innerHTML = `<div class="bot-message">До свидания! Возвращайтесь учить характеристики 🚚</div>`;
                });
            }

            emergencyBtn.addEventListener('click', () => {
                if (isCompleted) {
                    trainerContent.innerHTML = `<div class="bot-message">Тренировка завершена. До встречи!</div>`;
                    return;
                }
                if (allBrands.length > 0 && currentOrderIndex < allBrands.length) {
                    saveProgress();
                }
                trainerContent.innerHTML = `
                    <div class="final-screen">
                        <div class="bot-message">⏸️ Тренировка приостановлена. Прогресс сохранён.</div>
                        <div style="margin-top:2rem;">
                            <button class="primary-btn" id="restartAfterExit">Начать заново</button>
                        </div>
                    </div>
                `;
                document.getElementById('restartAfterExit')?.addEventListener('click', () => {
                    clearProgress();
                    brandOrder = createShuffledOrder(allBrands.length);
                    currentOrderIndex = 0;
                    showWelcomeModal(() => startTraining());
                });
            });

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function arraysEqualIgnoringOrder(a, b) {
                if (a.length !== b.length) return false;
                const sortedA = [...a].sort();
                const sortedB = [...b].sort();
                return sortedA.every((val, i) => val === sortedB[i]);
            }

            loadData();
        })();
    </script>
</body>
</html>
